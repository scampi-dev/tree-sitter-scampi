name: Fuzz Parser

on:
  push:
    branches: [main]
    paths:
      - src/parser.c
      - grammar.js
  pull_request:
    paths:
      - src/parser.c
      - grammar.js
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run fuzzer
        uses: tree-sitter/fuzz-action@v4
